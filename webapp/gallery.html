<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LSC Gallery — Todas las Señas</title>
    <meta name="description" content="Galería de todos los videos de Lengua de Señas Colombiana del dataset LSC50.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #00EDDA;
            --accent2: #7B5EA7;
            --gold: #ffd700;
            --bg: #07070f;
            --card-bg: rgba(255, 255, 255, 0.04);
            --border: rgba(255, 255, 255, 0.1);
            --text: #e8eaf6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            font-family: 'Outfit', sans-serif;
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ── PROGRESS BAR ────────────────────────────────── */
        #load-progress {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            border-radius: 3px;
            transition: width 0.6s ease;
            z-index: 200;
            width: 0%;
        }

        /* ── HEADER ──────────────────────────────────────── */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 24px;
            background: rgba(0, 0, 0, 0.6);
            border-bottom: 1px solid var(--border);
            z-index: 100;
            backdrop-filter: blur(12px);
            flex-shrink: 0;
        }

        .logo {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-meta {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.4);
        }

        .header-links {
            display: flex;
            gap: 10px;
        }

        .nav-btn {
            padding: 6px 16px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.06);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            font-size: 13px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.14);
        }

        .nav-btn.primary {
            background: linear-gradient(135deg, var(--accent), #00a8ff);
            color: #000;
            border-color: transparent;
            font-weight: 600;
        }

        /* ── TOOLBAR ─────────────────────────────────────── */
        #toolbar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 24px;
            border-bottom: 1px solid var(--border);
            background: rgba(0, 0, 0, 0.3);
            flex-shrink: 0;
            flex-wrap: wrap;
        }

        #search-input {
            flex: 1;
            min-width: 160px;
            max-width: 300px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
            padding: 7px 12px;
            outline: none;
            transition: border 0.2s;
        }

        #search-input:focus {
            border-color: var(--accent);
        }

        #search-input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .filter-btn {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.05);
            color: var(--text);
            transition: all 0.15s;
            white-space: nowrap;
        }

        .filter-btn.active {
            background: var(--accent);
            color: #000;
            border-color: transparent;
        }

        #sort-select {
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: 13px;
            padding: 6px 10px;
            cursor: pointer;
        }

        #count-display {
            font-size: 13px;
            font-weight: 600;
            color: var(--accent);
            white-space: nowrap;
            margin-left: auto;
        }

        /* ── GALLERY GRID ────────────────────────────────── */
        #gallery {
            flex: 1;
            padding: 16px 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 14px;
            align-content: start;
            overflow-y: auto;
        }

        /* ── SIGN CARD ───────────────────────────────────── */
        .sign-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
            position: relative;
        }

        .sign-card:hover {
            transform: translateY(-3px);
            border-color: var(--accent);
            box-shadow: 0 8px 28px rgba(0, 237, 218, 0.12);
        }

        .thumb-area {
            width: 100%;
            aspect-ratio: 4/3;
            position: relative;
            background: #0a0a18;
            overflow: hidden;
        }

        .video-thumb {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .thumb-placeholder {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: rgba(255, 255, 255, 0.15);
            font-size: 28px;
        }

        .thumb-placeholder span {
            font-size: 10px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .ph-spinner {
            width: 22px;
            height: 22px;
            border: 2px solid rgba(0, 237, 218, 0.15);
            border-top-color: rgba(0, 237, 218, 0.5);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .play-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.35);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .sign-card:hover .play-overlay {
            opacity: 1;
        }

        .play-icon {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: rgba(0, 237, 218, 0.25);
            border: 2px solid rgba(0, 237, 218, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .card-body {
            padding: 8px 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .sign-name {
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.4px;
        }

        .sign-id {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.3);
            font-family: monospace;
        }

        .card-actions {
            display: flex;
            gap: 5px;
        }

        .card-btn {
            width: 26px;
            height: 26px;
            border-radius: 7px;
            border: none;
            cursor: pointer;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
        }

        .btn-play-card {
            background: rgba(0, 237, 218, 0.12);
            color: var(--accent);
        }

        .btn-play-card:hover {
            background: rgba(0, 237, 218, 0.28);
        }

        .btn-visualize {
            background: rgba(123, 94, 167, 0.18);
            color: #c0a8ee;
        }

        .btn-visualize:hover {
            background: rgba(123, 94, 167, 0.38);
        }

        /* ── EMPTY STATE ─────────────────────────────────── */
        #empty-state {
            display: none;
            grid-column: 1/-1;
            text-align: center;
            padding: 60px;
            opacity: 0.4;
            font-size: 15px;
        }

        /* ── MODAL ───────────────────────────────────────── */
        #modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.88);
            z-index: 300;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }

        #modal.open {
            display: flex;
        }

        #modal-inner {
            background: rgba(8, 8, 22, 0.97);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            max-width: 680px;
            width: 94%;
            position: relative;
        }

        #modal video {
            width: 100%;
            display: block;
            max-height: 62vh;
            object-fit: contain;
            background: #000;
        }

        #modal-footer {
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        #modal-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--gold);
        }

        #modal-nav {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .modal-btn {
            padding: 6px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Outfit', sans-serif;
            font-size: 13px;
            border: 1px solid var(--border);
            transition: background 0.15s;
        }

        #modal-prev,
        #modal-next {
            background: rgba(255, 255, 255, 0.07);
            color: #fff;
            border-color: var(--border);
        }

        #modal-prev:hover,
        #modal-next:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        #modal-close {
            background: rgba(255, 80, 80, 0.1);
            color: #ff8080;
            border-color: rgba(255, 80, 80, 0.2);
        }

        #modal-vis {
            background: linear-gradient(135deg, var(--accent), #00a8ff);
            color: #000;
            border-color: transparent;
            font-weight: 600;
        }
    </style>
</head>

<body>

    <div id="load-progress"></div>

    <header>
        <div class="logo">🤟 LSC Gallery</div>
        <div class="header-meta">LSC50 — <span id="total-count">50</span> señas</div>
        <div class="header-links">
            <a href="/visualizer" class="nav-btn">🔀 Visualizador</a>
            <a href="/" class="nav-btn primary">✍️ Traducir</a>
        </div>
    </header>

    <div id="toolbar">
        <input id="search-input" type="text" placeholder="🔍 Buscar seña..." oninput="filterCards()">
        <button class="filter-btn active" onclick="setFilter('all',this)">Todas</button>
        <button class="filter-btn" onclick="setFilter('loaded',this)">✅ Con video</button>
        <select id="sort-select" onchange="sortCards()">
            <option value="alpha">A → Z</option>
            <option value="id">Por ID</option>
        </select>
        <div id="count-display">Cargando...</div>
    </div>

    <div id="gallery">
        <div id="empty-state">🔍 No se encontraron señas</div>
    </div>

    <!-- MODAL -->
    <div id="modal" onclick="handleModalClick(event)">
        <div id="modal-inner">
            <video id="modal-video" autoplay loop muted playsinline></video>
            <div id="modal-footer">
                <div id="modal-title">—</div>
                <div id="modal-nav">
                    <button class="modal-btn" id="modal-prev" onclick="navModal(-1)">◀</button>
                    <button class="modal-btn" id="modal-next" onclick="navModal(+1)">▶</button>
                    <button class="modal-btn" id="modal-vis" onclick="goVisualizerModal()">🔀 Visualizador</button>
                    <button class="modal-btn" id="modal-close" onclick="closeModal()">✕</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        'use strict';

        // ═══ SIGN DATA ════════════════════════════════════════════════════════════════
        const GLOSS_TO_SIGNID = {
            "AMIGO": "0000", "AMOR": "0001", "AYUDA": "0002", "BIEN": "0003", "BUENAS": "0004",
            "BUENAS_NOCHES": "0005", "CAFE": "0006", "CAMINAR": "0007", "CASA": "0008", "COMER": "0009",
            "COMUNICACION": "0010", "CORRER": "0011", "DINERO": "0012", "DORMIR": "0013", "ENFERMO": "0014",
            "ESTUDIANTE": "0015", "FAMILIA": "0016", "FELIZ": "0017", "GRACIAS": "0018", "GRANDE": "0019",
            "HABLAR": "0020", "HOLA": "0021", "HOMBRE": "0022", "HOSPITAL": "0023", "JUGAR": "0024",
            "LECHE": "0025", "LLAMAR": "0026", "LUNES": "0027", "MADRE": "0028", "MAL": "0029",
            "MAÑANA": "0030", "MES": "0031", "MIERCOLES": "0032", "MUJER": "0033", "NECESITAR": "0034",
            "NIÑO": "0035", "NOCHE": "0036", "NUMERO": "0037", "PADRE": "0038", "PAN": "0039",
            "PEQUEÑO": "0040", "PERDON": "0041", "POLICIA": "0042", "PREGUNTA": "0043", "SABADO": "0044",
            "SALUD": "0045", "TARDE": "0046", "TRABAJO": "0047", "VIERNES": "0048", "VIVIR": "0049"
        };

        let ALL_SIGNS = Object.entries(GLOSS_TO_SIGNID)
            .map(([gloss, id]) => ({ gloss, id }))
            .sort((a, b) => a.gloss.localeCompare(b.gloss));

        let cards = [];
        let loadedVideos = new Set();
        let currentFilter = 'all';
        let modalGloss = null;

        // ═══ BUILD GALLERY ════════════════════════════════════════════════════════════
        function buildGallery() {
            const gallery = document.getElementById('gallery');
            ALL_SIGNS.forEach(({ gloss, id }) => {
                const card = document.createElement('div');
                card.className = 'sign-card';
                card.dataset.gloss = gloss;
                card.dataset.id = id;
                card.innerHTML = `
            <div class="thumb-area">
                <div class="thumb-placeholder" id="ph-${gloss}">
                    <div class="ph-spinner"></div>
                    <span>${gloss.replace(/_/g, ' ')}</span>
                </div>
                <video class="video-thumb" id="vid-${gloss}" muted loop playsinline preload="none"></video>
                <div class="play-overlay"><div class="play-icon">▶</div></div>
            </div>
            <div class="card-body">
                <div>
                    <div class="sign-name">${gloss.replace(/_/g, ' ')}</div>
                    <div class="sign-id">#${id}</div>
                </div>
                <div class="card-actions">
                    <button class="card-btn btn-play-card" title="Ver video" onclick="openModal('${gloss}',event)">▶</button>
                    <button class="card-btn btn-visualize" title="Visualizador" onclick="goVisualizer('${gloss}',event)">🔀</button>
                </div>
            </div>`;

                card.addEventListener('mouseenter', () => {
                    const v = document.getElementById('vid-' + gloss);
                    if (v && v.src && v.style.display !== 'none') v.play().catch(() => { });
                });
                card.addEventListener('mouseleave', () => {
                    const v = document.getElementById('vid-' + gloss);
                    if (v && !v.paused) v.pause();
                });
                card.addEventListener('click', e => {
                    if (!e.target.closest('.card-actions')) openModal(gloss, e);
                });

                gallery.insertBefore(card, document.getElementById('empty-state'));
                cards.push({ gloss, id, card });
            });
            document.getElementById('total-count').textContent = ALL_SIGNS.length;
            updateCount();
            startPolling();
        }

        // ═══ POLL /api/video_status every 3s ═════════════════════════════════════════
        let knownReady = new Set();
        let pollTimer = null;

        async function pollStatus() {
            try {
                const r = await fetch('/api/video_status');
                if (!r.ok) return;
                const data = await r.json();
                const st = data.status;

                for (const [gloss, state] of Object.entries(st)) {
                    if (state === 'ready' && !knownReady.has(gloss)) {
                        knownReady.add(gloss);
                        showVideoThumb(gloss);
                    } else if ((state === 'error') && !knownReady.has(gloss)) {
                        showErrorThumb(gloss);
                    }
                }

                const pct = Math.round((knownReady.size / ALL_SIGNS.length) * 100);
                document.getElementById('load-progress').style.width = pct + '%';
                if (pct >= 100) {
                    clearInterval(pollTimer);
                    setTimeout(() => { document.getElementById('load-progress').style.opacity = '0'; }, 1500);
                }
                updateCount();
                filterCards();
            } catch { /* server may be starting */ }
        }

        function startPolling() {
            pollStatus();
            pollTimer = setInterval(pollStatus, 3000);
        }

        function showVideoThumb(gloss) {
            const ph = document.getElementById('ph-' + gloss);
            const vid = document.getElementById('vid-' + gloss);
            const c = cards.find(x => x.gloss === gloss);
            if (!vid) return;

            vid.src = `/api/video/${gloss}`;
            vid.oncanplay = () => {
                if (ph) ph.style.display = 'none';
                vid.style.display = 'block';
                loadedVideos.add(gloss);
                if (c) c.card.dataset.loaded = '1';
            };
            vid.onerror = () => showErrorThumb(gloss);
            vid.load();
        }

        function showErrorThumb(gloss) {
            const ph = document.getElementById('ph-' + gloss);
            if (ph && !loadedVideos.has(gloss)) {
                ph.innerHTML = '<span style="font-size:24px;opacity:0.25">🤷</span><span>sin video</span>';
                ph.style.cursor = 'default';
            }
        }

        // ═══ FILTER / SEARCH / SORT ═══════════════════════════════════════════════════
        function filterCards() {
            const q = document.getElementById('search-input').value.trim().toUpperCase();
            let visible = 0;
            cards.forEach(({ gloss, card }) => {
                const matchQ = !q || gloss.includes(q) || gloss.replace(/_/g, ' ').includes(q);
                const matchF = currentFilter === 'all' || (currentFilter === 'loaded' && card.dataset.loaded === '1');
                const show = matchQ && matchF;
                card.style.display = show ? '' : 'none';
                if (show) visible++;
            });
            document.getElementById('empty-state').style.display = visible === 0 ? 'block' : 'none';
            updateCount(visible);
        }

        function setFilter(f, btn) {
            currentFilter = f;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            filterCards();
        }

        function sortCards() {
            const mode = document.getElementById('sort-select').value;
            const gallery = document.getElementById('gallery');
            const sorted = [...cards].sort((a, b) =>
                mode === 'alpha' ? a.gloss.localeCompare(b.gloss) : a.id.localeCompare(b.id)
            );
            sorted.forEach(c => gallery.insertBefore(c.card, document.getElementById('empty-state')));
        }

        function updateCount(n) {
            const shown = typeof n === 'number' ? n : cards.filter(c => c.card.style.display !== 'none').length;
            const loaded = loadedVideos.size;
            const total = ALL_SIGNS.length;
            document.getElementById('count-display').textContent =
                `${shown} señas · ${loaded}/${total} videos ✅`;
        }

        // ═══ MODAL ════════════════════════════════════════════════════════════════════
        function openModal(gloss, e) {
            if (e) e.stopPropagation();
            modalGloss = gloss;
            const vid = document.getElementById('modal-video');
            vid.src = `/api/video/${gloss}`;
            vid.play().catch(() => { });
            document.getElementById('modal-title').textContent = gloss.replace(/_/g, ' ');
            document.getElementById('modal').classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function navModal(dir) {
            const idx = ALL_SIGNS.findIndex(s => s.gloss === modalGloss);
            const next = ALL_SIGNS[(idx + dir + ALL_SIGNS.length) % ALL_SIGNS.length].gloss;
            openModal(next);
        }

        function goVisualizerModal() {
            sessionStorage.setItem('lsc_selected_gloss', modalGloss);
            window.open('/visualizer', '_blank');
        }

        function closeModal() {
            const vid = document.getElementById('modal-video');
            vid.pause(); vid.src = '';
            document.getElementById('modal').classList.remove('open');
            document.body.style.overflow = '';
        }

        function handleModalClick(e) {
            if (e.target === document.getElementById('modal')) closeModal();
        }

        function goVisualizer(gloss, e) {
            if (e) e.stopPropagation();
            sessionStorage.setItem('lsc_selected_gloss', gloss);
            window.open('/visualizer', '_blank');
        }

        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') closeModal();
            if (e.key === 'ArrowRight' && modalGloss) navModal(+1);
            if (e.key === 'ArrowLeft' && modalGloss) navModal(-1);
        });

        // ═══ INIT ═════════════════════════════════════════════════════════════════════
        buildGallery();
    </script>
</body>

</html>
