<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LSC VRM Player - Professional Edition</title>
    <link rel="stylesheet" href="style.css">
    <!-- Three.js and Plugins via CDN -->
    <script src="https://unpkg.com/three@0.147.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.147.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://unpkg.com/three@0.147.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://unpkg.com/@pixiv/three-vrm@1.0.8/lib/three-vrm.min.js"></script>
    <!-- Kalidokit for Kinematics -->
    <script src="https://unpkg.com/kalidokit@1.1/dist/kalidokit.umd.js"></script>
</head>

<body>

    <!-- Status Panel -->
    <div id="status-panel" class="gui-panel">
        <h1>LSC Motion Engine</h1>
        <p id="status">Iniciando sistema...</p>
        <div class="badge" id="sign-badge">Esperando...</div>
    </div>

    <!-- Controls Panel -->
    <div id="controls-panel" class="gui-panel">
        <button id="btn-play">
            <span id="play-icon">▶</span> <span id="btn-text">Play Motion</span>
        </button>
        <div id="frame-counter">Frame: 0 / 60</div>
    </div>

    <script type="module" src="app.js"></script>
</body>

</html>
